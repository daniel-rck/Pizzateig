name = "pizzateig"
main = "worker/index.ts"
compatibility_date = "2026-06-15"

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
# Route every request through the worker so security headers (CSP etc.) are
# applied to directly-matched assets too, not only SPA-fallback paths.
run_worker_first = true

# Uncomment when adding R2/KV (see sync template):
# [[r2_buckets]]
# binding = "SYNC"
# bucket_name = "<app-name>-sync"
#
# [[kv_namespaces]]
# binding = "SYNC_KV"
# id = "<kv-namespace-id>"
