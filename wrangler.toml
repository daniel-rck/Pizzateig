name = "pizzateig"
main = "worker/index.ts"
compatibility_date = "2026-06-15"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

# Uncomment when adding R2/KV (see sync template):
# [[r2_buckets]]
# binding = "SYNC"
# bucket_name = "<app-name>-sync"
#
# [[kv_namespaces]]
# binding = "SYNC_KV"
# id = "<kv-namespace-id>"
